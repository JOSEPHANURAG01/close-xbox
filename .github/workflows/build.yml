name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows you to trigger manually from GitHub UI

jobs:
  build:
    runs-on: windows-latest  # Uses a real Windows machine in the cloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psutil pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole close_xbox.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: close_xbox
          path: dist/close_xbox.exe